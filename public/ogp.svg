<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#shine)"/>
  <!-- 装飾円 -->
  <circle cx="200" cy="100" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1000" cy="530" r="250" fill="rgba(255,255,255,0.04)"/>
  <!-- ロゴ -->
  <rect x="530" y="160" width="60" height="60" rx="14" fill="white"/>
  <text x="560" y="205" text-anchor="middle" font-family="Hiragino Sans,sans-serif" font-weight="800" font-size="36" fill="#4F46E5">S</text>
  <!-- サービス名 -->
  <text x="600" y="300" text-anchor="middle" font-family="Hiragino Sans,sans-serif" font-weight="800" font-size="56" fill="white">スマ撮り証明写真</text>
  <!-- タグライン -->
  <text x="600" y="365" text-anchor="middle" font-family="Hiragino Sans,sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.8)">スマホで撮って、AIが証明写真に仕上げます</text>
  <!-- バッジ -->
  <rect x="410" y="410" width="380" height="44" rx="22" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="440" text-anchor="middle" font-family="Hiragino Sans,sans-serif" font-weight="600" font-size="18" fill="white">登録不要 ・ 無料 ・ スマホ対応</text>
</svg>
